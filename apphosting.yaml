# Firebase App Hosting configuration for the Next.js app.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Server-side OCR configuration used by actions/records/scan-actions.ts.
env:
  - variable: OCR_API_URL
    value: https://digivax-ocr-6fntyewn7q-as.a.run.app/ocr
    availability:
      - RUNTIME

  - variable: OCR_API_KEY
    secret: digivaxOcrApiKey
    availability:
      - RUNTIME

  - variable: OCR_USE_MOCK
    value: "false"
    availability:
      - RUNTIME

  - variable: BIOBERT_API_URL
    value: https://digivax-biobert-6fntyewn7q-as.a.run.app
    availability:
      - RUNTIME

  - variable: BIOBERT_API_KEY
    secret: digivaxBioBertApiKey
    availability:
      - RUNTIME
